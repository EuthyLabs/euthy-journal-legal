<!DOCTYPE html>
<html lang="en">
<head>

        .container { background: #fff; padding: 60px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }

        .btn { display: block; padding: 15px 25px; background-color: #386B40; color: white; text-decoration: none; border-radius: 8px; font-weight: 600; transition: background-color 0.2s; }
